# ========================
# 基础设置（保持不变）
# ========================
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
# set -g allow-passthrough on

set -g mouse on                          # 启用鼠标支持
setw -g mode-keys vi
setw -g automatic-rename off
set -g history-limit 10000               # 增大滚动历史
set-option -sg escape-time 10


# ========================
# 前缀键优化（保持不变）
# ========================
unbind C-b
set -g prefix C-k
bind C-k send-prefix


# ========================
# 窗口状态（保持不变）
# ========================
setw -g window-status-format "#[fg=colour248,bg=colour235] #I:#W "
setw -g window-status-current-format "#[fg=colour255,bg=colour240,bold] #I:#W "


# ========================
# 窗口/面板操作（保持不变）
# ========================
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind r source-file ~/.tmux.conf \; display "Reloaded!"  # 重载配置

set-window-option -g pane-base-index 1
bind-key k select-pane -U
bind-key j select-pane -D
bind-key h select-pane -L
bind-key l select-pane -R

bind -r K resizep -U 5
bind -r J resizep -D 5
bind -r H resizep -L 5
bind -r L resizep -R 5


# ========================
# 状态栏美化（保持不变）
# ========================
set -g status-bg colour235
set -g status-fg colour137
set -g status-left "#[fg=green]#S #[fg=colour245]» "
set -g status-right "#[fg=colour245]« #[fg=colour137]%Y-%m-%d %H:%M"


# ========================
# 🔥 新增：tmux-resurrect + tmux-continuum（持久化恢复）
# ========================
# 启用 Tmux Plugin Manager (TPM)
set -g @plugin 'tmux-plugins/tpm'

# 会话保存与恢复插件
set -g @plugin 'tmux-plugins/tmux-resurrect'

# 自动保存 + 开机自动恢复
set -g @plugin 'tmux-plugins/tmux-continuum'

# 每15分钟自动保存一次（可调）
set -g @continuum-save-interval '10'

# 开启开机自动恢复（配合 shell 登录脚本）
set -g @continuum-restore 'on'

# 可选：恢复 pane 中的内容（如 vim 编辑的文件、命令行历史）
set -g @resurrect-capture-pane-contents 'on'

# 可选：扩展可恢复的程序（根据你的开发环境添加）
# 示例：恢复 node、python、ssh、npm/yarn 等
set -g @resurrect-processes 'ssh "~node" "~python" "~yarn dev" "~npm run" "~docker-compose" "~htop"'


# ========================
# TPM 初始化（必须放在最后！）
# ========================
run -b '~/.tmux/plugins/tpm/tpm'
